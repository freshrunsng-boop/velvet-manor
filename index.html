<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Manor | Private Concierge</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --text: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--dark);
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1560185127-6ed189bf02f4?q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); letter-spacing: 5px; text-decoration: none; font-weight: 700; }

        .hero-content { max-width: 800px; padding: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 20px; font-style: italic; }
        p { font-size: 1rem; letter-spacing: 3px; color: #ccc; text-transform: uppercase; margin-bottom: 40px; }

        .btn-enter {
            padding: 20px 50px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
            transition: 0.5s;
        }
        .btn-enter:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .footer-note { position: absolute; bottom: 30px; font-size: 0.7rem; color: #666; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav><a href="index.html" class="logo">VELVET MANOR</a></nav>

    <div class="hero-content">
        <p>A Private Social Concierge</p>
        <h1>Discretion is the <br> Ultimate Luxury</h1>
        <div style="margin-top: 50px;">
            <a href="register.html" class="btn-enter">Enter the Manor</a>
        </div>
    </div>

    <div class="footer-note">BY INVITATION ONLY • 2026</div>

</body>
</html>
