<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Manor | Private Concierge</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--dark);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1560185127-6ed189bf02f4?q=80&w=2070');
            background-size: cover; background-position: center; background-attachment: fixed;
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--text); font-family: 'Poppins', sans-serif; text-align: center;
        }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.95); position: fixed; top: 0; width: 100%; z-index: 1000; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); height: 70px; padding: 0 5%; 
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); text-decoration: none; letter-spacing: 2px; font-weight: 700; }
        .nav-links { display: flex; list-style: none; gap: 15px; }
        .nav-links a { text-decoration: none; color: #ccc; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }

        .hero-content { max-width: 800px; padding: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 3.5rem); margin-bottom: 20px; font-style: italic; }
        p.tagline { font-size: 0.8rem; letter-spacing: 3px; color: #ccc; text-transform: uppercase; margin-bottom: 40px; }

        .btn-enter {
            padding: 18px 40px; background: transparent; border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; text-transform: uppercase;
            letter-spacing: 4px; font-weight: 600; transition: 0.5s; font-size: 0.9rem;
        }
        .btn-enter:hover { background: var(--gold); color: black; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }

        @media (max-width: 600px) {
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 0.55rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">VELVET MANOR</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="matchmaking.html">Gallery</a></li>
            <li><a href="https://wa.me/2347086415253">Concierge</a></li>
        </ul>
    </nav>
    <div class="hero-content">
        <p class="tagline">A Private Social Concierge</p>
        <h1>Discretion is the <br> Ultimate Luxury</h1>
        <div style="margin-top: 50px;"><a href="register.html" class="btn-enter">Enter the Manor</a></div>
    </div>
</body>
</html>
