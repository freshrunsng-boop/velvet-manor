<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply | Velvet Manor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --text: #ffffff; --gold-gradient: linear-gradient(135deg, #af8f2c 0%, #d4af37 50%, #f9e29d 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--dark); color: var(--text); font-family: 'Poppins', sans-serif; padding: 100px 20px 60px; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.95); position: fixed; top: 0; width: 100%; z-index: 1000; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); height: 70px; padding: 0 5%; 
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
        .nav-links { display: flex; list-style: none; gap: 12px; }
        .nav-links a { text-decoration: none; color: #ccc; font-size: 0.6rem; text-transform: uppercase; }

        .reg-container { max-width: 500px; width: 100%; background: #0a0a0a; padding: 30px; border: 1px solid rgba(212, 175, 55, 0.2); margin: 0 auto; }
        h2 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 25px; text-align: center; font-size: 1.6rem; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.65rem; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: white; font-family: 'Poppins', sans-serif; }
        
        .terms-box { display: flex; align-items: flex-start; gap: 10px; margin: 20px 0; font-size: 0.7rem; color: #aaa; }
        .btn-submit { width: 100%; padding: 16px; background: var(--gold-gradient); border: none; color: black; font-weight: 800; text-transform: uppercase; cursor: pointer; letter-spacing: 1px; }
        .btn-submit:disabled { background: #333; color: #666; cursor: not-allowed; }

        #success-overlay, #terms-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--gold); padding: 35px; max-width: 450px; text-align: center; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">VELVET MANOR</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="matchmaking.html">Gallery</a></li>
            <li><a href="https://wa.me/2347086415253">Concierge</a></li>
        </ul>
    </nav>

    <div class="reg-container">
        <h2>Membership Application</h2>
        <form id="registrationForm">
            <div class="form-group"><label>Name / Alias</label><input type="text" name="Name" required></div>
            <div class="form-group"><label>Email Address</label><input type="email" name="Email" required></div>
            <div class="form-group"><label>WhatsApp Number</label><input type="tel" name="Phone" value="+234" required></div>
            <div class="form-group">
                <label>Interest</label>
                <select name="Interest" required>
                    <option value="Matchmaking">Matchmaking & Connections</option>
                    <option value="Events">Elite Events</option>
                </select>
            </div>
            <div class="form-group"><label>Gallery Photo</label><input type="file" id="photoInput" accept="image/*" required></div>
            <div class="form-group"><label>Introduction</label><textarea name="About" rows="2"></textarea></div>

            <div class="terms-box">
                <input type="checkbox" id="agree" onchange="document.getElementById('submitBtn').disabled = !this.checked">
                <label>I acknowledge the <span onclick="document.getElementById('terms-modal').style.display='flex'" style="color:var(--gold); text-decoration:underline; cursor:pointer;">Manor Protocol</span></label>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn" disabled>Submit Application</button>
        </form>
    </div>

    <div id="terms-modal"><div class="modal-content">
        <h3 style="color:var(--gold); margin-bottom:15px; font-family:'Playfair Display';">The Manor Protocol</h3>
        <p style="font-size:0.8rem; color:#ccc; text-align:left; line-height:1.5;">1. Absolute Discretion. 2. 18+ Only. 3. Verification Required. 4. Fees non-refundable.</p>
        <button onclick="document.getElementById('terms-modal').style.display='none'" class="btn-submit" style="margin-top:25px;">I Understand</button>
    </div></div>

    <div id="success-overlay"><div class="modal-content">
        <h2 style="color:var(--gold);">✓ Protocol Secured</h2>
        <p>Connecting you to the Concierge...</p>
    </div></div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function() { emailjs.init("uWmQRqgqm6vHOuEyq"); })();

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Securing..."; btn.disabled = true;

            const file = document.getElementById('photoInput').files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    // We shrink the image to 300px width - plenty for a small preview
                    const MAX_WIDTH = 300; 
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH; 
                    canvas.height = img.height * scale;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // 0.4 quality makes the file size tiny and reliable
                    const compressedPhoto = canvas.toDataURL('image/jpeg', 0.4); 
                    const appID = "VM-" + Math.floor(1000 + Math.random() * 9000);
                    
                    const payload = {
                        "Name": document.getElementsByName('Name')[0].value,
                        "Email": document.getElementsByName('Email')[0].value,
                        "Phone": document.getElementsByName('Phone')[0].value,
                        "Interest": document.getElementsByName('Interest')[0].value,
                        "PhotoURL": compressedPhoto,
                        "About": document.getElementsByName('About')[0].value,
                        "AppID": appID,
                        "Status": "Pending"
                    };

                    try {
                        const response = await fetch('https://sheetdb.io/api/v1/9fmdq22gjdw29', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ data: [payload] })
                        });

                        if (!response.ok) {
                            throw new Error('Database full or offline');
                        }

                        // EmailJS triggers only if Database succeeds
                        await emailjs.send("service_xtgp1ti", "template_confirm", {
                            to_name: payload.Name,
                            user_email: payload.Email,
                            app_id: appID
                        });

                    } catch (err) {
                        console.error("Error:", err);
                        // If it fails, we alert the user but still let them go to WhatsApp
                        alert("The Manor is busy. Redirecting to Concierge for manual check...");
                    }

                    document.getElementById('success-overlay').style.display = 'flex';
                    setTimeout(() => {
                        window.location.href = `https://wa.me/2347086415253?text=ID:${appID}%20Reg:%20${payload.Name}`;
                    }, 2000);
                };
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>

</html>
