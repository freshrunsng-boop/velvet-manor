<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gallery | Velvet Manor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --card-bg: #151515;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(10,10,10,0.98), rgba(10,10,10,0.98)), 
                        url('https://images.unsplash.com/photo-1566417713940-fe7c737a9ef2?q=80&w=2000');
            background-attachment: fixed;
            background-size: cover;
            padding-top: 100px;
        }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(0,0,0,0.95);
            position: fixed; top: 0; width: 100%; z-index: 100;
            border-bottom: 1px solid var(--glass);
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 30px; }
        .nav-links a { text-decoration: none; color: white; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        /* Header */
        .gallery-header { text-align: center; padding: 60px 20px 40px; }
        .gallery-header h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 10px; }
        .gallery-header p { font-weight: 300; color: #888; letter-spacing: 1px; font-size: 0.9rem; }

        /* Matchmaking Grid */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            padding: 0 8% 100px;
        }

        /* Profile Card */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 4px;
            overflow: hidden;
            transition: 0.5s;
            position: relative;
            animation: fadeIn 0.8s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .image-container { width: 100%; height: 420px; overflow: hidden; position: relative; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(40%); transition: 0.6s; }
        .profile-card:hover .profile-img { filter: grayscale(0%); transform: scale(1.05); }

        .id-badge {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.85); color: var(--gold);
            padding: 5px 12px; font-size: 0.7rem; border-radius: 2px;
            letter-spacing: 1px; border: 1px solid var(--gold);
            z-index: 10; font-weight: 600;
        }

        .profile-info { padding: 25px; text-align: center; background: #0f0f0f; }
        .profile-info h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #fff; margin-bottom: 5px; }
        .profile-info .interest { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; font-weight: 600; }

        .btn-connect {
            display: inline-block; width: 100%; padding: 15px;
            background: transparent; border: 1px solid var(--gold); color: var(--gold); text-decoration: none;
            font-weight: 600; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.3s;
        }
        .btn-connect:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        /* Loader */
        #loader { text-align: center; color: var(--gold); width: 100%; padding: 50px; font-style: italic; letter-spacing: 1px; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .match-grid { padding: 0 5% 100px; }
            .gallery-header h1 { font-size: 2.2rem; }
            .image-container { height: 380px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">VELVET MANOR</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="register.html">Apply</a></li>
            <li><a href="https://wa.me/2347086415253" style="color: var(--gold);">Concierge</a></li>
        </ul>
    </nav>

    <header class="gallery-header">
        <h1>The Archives</h1>
        <p>Restricted access. Curated excellence.</p>
    </header>

    <section class="match-grid" id="profileGallery">
        <div id="loader">Consulting the Manor records...</div>
    </section>

    <script>
        // --- THE GATEKEEPER LOCK ---
        // Verifies if the user has registered in this browser
        if (localStorage.getItem('velvet_member') !== 'true') {
            alert("Entry Denied: You must submit an application before viewing the Manor Archives.");
            window.location.href = "register.html";
        }

        const API_URL = 'https://sheetdb.io/api/v1/9fmdq22gjdw29';
        const gallery = document.getElementById('profileGallery');

        async function fetchApprovedMembers() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // Clear loader
                gallery.innerHTML = '';

                // Filter for 'Approved' status only (Case Sensitive)
                const approved = data.filter(member => member.Status === "Approved");

                if (approved.length === 0) {
                    gallery.innerHTML = '<p style="text-align:center; width:100%; color:#555; padding: 40px;">The archives are currently being refreshed. Please check back shortly.</p>';
                    return;
                }

                // Render the cards
                approved.forEach(member => {
                    // WhatsApp message includes the ₦10k intent
                    const waMessage = `Greetings Concierge, I am interested in a connection with ${member.Name} (Ref: ${member.AppID}). Please provide payment details for the introduction fee.`;
                    const waLink = `https://wa.me/2347086415253?text=${encodeURIComponent(waMessage)}`;

                    const card = `
                        <div class="profile-card">
                            <div class="id-badge">ID: #${member.AppID}</div>
                            <div class="image-container">
                                <img src="${member.PhotoURL}" alt="Member" class="profile-img" onerror="this.src='https://via.placeholder.com/400x500?text=Profile+In+Review'">
                            </div>
                            <div class="profile-info">
                                <h3>${member.Name}</h3>
                                <span class="interest">${member.Interest}</span>
                                <a href="${waLink}" class="btn-connect">
                                    Request Introduction
                                </a>
                            </div>
                        </div>
                    `;
                    gallery.innerHTML += card;
                });

            } catch (error) {
                console.error("Gallery Error:", error);
                gallery.innerHTML = '<p style="color:var(--gold); text-align:center; width:100%;">Connection to the Manor lost. Please refresh.</p>';
            }
        }

        // Initialize loading
        fetchApprovedMembers();
    </script>

</body>
</html>
